<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="820" viewBox="0 0 1240 820" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="arrAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d79b00"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#82b366"/>
    </marker>
    <marker id="arrGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d6b656"/>
    </marker>
  </defs>

  <rect width="1240" height="820" fill="#ffffff"/>
  <text x="20" y="34" font-size="17" font-weight="700" fill="#1f2328">cme_md_connector — CME MDP 3.0 / SBE connector + load test (HFT-style inline pipeline)</text>

  <!-- ===== Generator lane ===== -->
  <rect x="20" y="60" width="232" height="560" rx="8" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="136" y="84" font-size="13" font-weight="700" fill="#1f2328" text-anchor="middle">Generator thread</text>
  <text x="136" y="100" font-size="11" fill="#3b4a5a" text-anchor="middle">(open-loop, paced)</text>

  <rect x="46" y="120" width="180" height="52" rx="6" fill="#fff" stroke="#6c8ebf"/>
  <text x="136" y="143" font-size="12" fill="#1f2328" text-anchor="middle">OU price model</text>
  <text x="136" y="159" font-size="11" fill="#555" text-anchor="middle">(mean-reverting series)</text>

  <rect x="46" y="200" width="180" height="56" rx="6" fill="#fff" stroke="#6c8ebf"/>
  <text x="136" y="223" font-size="12" fill="#1f2328" text-anchor="middle">encode MDP3 / SBE</text>
  <text x="136" y="239" font-size="11" fill="#555" text-anchor="middle">(same codec decoder validates)</text>

  <rect x="46" y="430" width="180" height="56" rx="6" fill="#f5f5f5" stroke="#999" stroke-dasharray="5 4"/>
  <text x="136" y="453" font-size="12" fill="#333" text-anchor="middle">pcap replay</text>
  <text x="136" y="469" font-size="11" fill="#555" text-anchor="middle">(--pcap, alt source)</text>

  <text x="46" y="600" font-size="10" fill="#6c8ebf">src/loadgen</text>

  <!-- ===== Ring ===== -->
  <g>
    <path d="M300,322 a55,12 0 0 1 110,0 v66 a55,12 0 0 1 -110,0 z" fill="#e1d5e7" stroke="#9673a6"/>
    <ellipse cx="355" cy="322" rx="55" ry="12" fill="#e1d5e7" stroke="#9673a6"/>
    <text x="355" y="350" font-size="11.5" font-weight="700" fill="#3d2c47" text-anchor="middle">rtrb SPSC ring</text>
    <text x="355" y="366" font-size="10.5" fill="#5a4668" text-anchor="middle">lock-free hand-off</text>
    <text x="355" y="380" font-size="10.5" fill="#5a4668" text-anchor="middle">(hop is BEFORE t0)</text>
  </g>

  <!-- ===== Hot consumer lane ===== -->
  <rect x="470" y="60" width="340" height="700" rx="8" fill="#ffe6cc" stroke="#d79b00"/>
  <text x="640" y="84" font-size="13" font-weight="700" fill="#1f2328" text-anchor="middle">Hot consumer thread</text>
  <text x="640" y="100" font-size="11" fill="#7a5a18" text-anchor="middle">inline · zero-copy · allocation-free · busy-spin</text>

  <rect x="540" y="118" width="200" height="48" rx="6" fill="#fff" stroke="#d79b00"/>
  <text x="640" y="138" font-size="12" font-weight="600" fill="#1f2328" text-anchor="middle">pop · stamp t0</text>
  <text x="640" y="154" font-size="10.5" fill="#555" text-anchor="middle">(ingest hand-off excluded)</text>

  <rect x="540" y="186" width="200" height="52" rx="6" fill="#fff" stroke="#d79b00"/>
  <text x="640" y="207" font-size="12" font-weight="600" fill="#1f2328" text-anchor="middle">decode → t1</text>
  <text x="640" y="223" font-size="10" fill="#555" text-anchor="middle">header + SBE framing + refresh</text>

  <rect x="540" y="258" width="200" height="52" rx="6" fill="#fff" stroke="#d79b00"/>
  <text x="640" y="279" font-size="12" font-weight="600" fill="#1f2328" text-anchor="middle">book → BBO → t2</text>
  <text x="640" y="295" font-size="10" fill="#555" text-anchor="middle">depth ladder + RptSeq gaps</text>

  <rect x="540" y="330" width="200" height="52" rx="6" fill="#fff" stroke="#d79b00"/>
  <text x="640" y="351" font-size="12" font-weight="600" fill="#1f2328" text-anchor="middle">signal → t3</text>
  <text x="640" y="367" font-size="10" fill="#555" text-anchor="middle">EWMA z-score mean-reversion</text>

  <rect x="540" y="402" width="200" height="52" rx="6" fill="#fff" stroke="#d79b00"/>
  <text x="640" y="423" font-size="12" font-weight="600" fill="#1f2328" text-anchor="middle">risk → t4</text>
  <text x="640" y="439" font-size="10" fill="#555" text-anchor="middle">price band · pos limit · loss kill</text>

  <rect x="540" y="474" width="200" height="52" rx="6" fill="#fff" stroke="#d79b00"/>
  <text x="640" y="495" font-size="12" font-weight="600" fill="#1f2328" text-anchor="middle">gateway → t5</text>
  <text x="640" y="511" font-size="10" fill="#555" text-anchor="middle">OrderID · ack NEW · midpoint fill</text>

  <rect x="540" y="546" width="200" height="52" rx="6" fill="#fff2cc" stroke="#d6b656"/>
  <text x="640" y="567" font-size="12" font-weight="600" fill="#1f2328" text-anchor="middle">position / PnL book</text>
  <text x="640" y="583" font-size="10" fill="#555" text-anchor="middle">fills → net pos + realized/unreal</text>

  <rect x="540" y="618" width="200" height="58" rx="6" fill="#fff" stroke="#d79b00"/>
  <text x="640" y="639" font-size="12" font-weight="600" fill="#1f2328" text-anchor="middle">record HdrHistograms</text>
  <text x="640" y="654" font-size="10" fill="#555" text-anchor="middle">per-stage + tick→signal + tick→order</text>
  <text x="640" y="668" font-size="10" fill="#555" text-anchor="middle">(record_correct vs coord. omission)</text>

  <!-- ===== Reporter / Dashboard lane ===== -->
  <rect x="880" y="60" width="330" height="700" rx="8" fill="#d5e8d4" stroke="#82b366"/>
  <text x="1045" y="84" font-size="13" font-weight="700" fill="#1f2328" text-anchor="middle">Reporter &amp; Dashboard threads</text>

  <rect x="910" y="118" width="270" height="76" rx="6" fill="#fff" stroke="#82b366"/>
  <text x="1045" y="140" font-size="12" font-weight="600" fill="#1f2328" text-anchor="middle">browser UI</text>
  <text x="1045" y="157" font-size="10" fill="#555" text-anchor="middle">live charts: PnL · net position ·</text>
  <text x="1045" y="171" font-size="10" fill="#555" text-anchor="middle">tick→order · tick→signal ·</text>
  <text x="1045" y="185" font-size="10" fill="#555" text-anchor="middle">throughput · per-stage p99</text>

  <rect x="910" y="262" width="270" height="56" rx="6" fill="#fff" stroke="#82b366"/>
  <text x="1045" y="285" font-size="12" font-weight="600" fill="#1f2328" text-anchor="middle">dashboard thread</text>
  <text x="1045" y="301" font-size="10.5" fill="#555" text-anchor="middle">tiny_http serves UI + /metrics.json</text>

  <rect x="910" y="402" width="270" height="50" rx="6" fill="#fff2cc" stroke="#d6b656"/>
  <text x="1045" y="423" font-size="12" font-weight="600" fill="#1f2328" text-anchor="middle">ArcSwap</text>
  <text x="1045" y="439" font-size="10.5" fill="#555" text-anchor="middle">latest published snapshot</text>

  <rect x="910" y="536" width="270" height="56" rx="6" fill="#fff" stroke="#82b366"/>
  <text x="1045" y="559" font-size="12" font-weight="600" fill="#1f2328" text-anchor="middle">reporter (~1s)</text>
  <text x="1045" y="575" font-size="10.5" fill="#555" text-anchor="middle">snapshot → p50/p95/p99 + totals</text>

  <!-- ===== Edges ===== -->
  <!-- generator internal -->
  <path d="M136,172 V200" fill="none" stroke="#6c8ebf" stroke-width="1.6" marker-end="url(#arr)"/>
  <!-- encode -> ring -->
  <path d="M226,236 H272 Q300,236 300,300 V322" fill="none" stroke="#6c8ebf" stroke-width="1.6" marker-end="url(#arr)"/>
  <!-- pcap -> ring -->
  <path d="M226,458 H272 Q300,458 300,400 V392" fill="none" stroke="#999" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <!-- ring -> pop -->
  <path d="M410,350 H490 Q540,350 540,160 V166" fill="none" stroke="#9673a6" stroke-width="2.2" marker-end="url(#arr)"/>

  <!-- hot path chain -->
  <path d="M640,166 V186" fill="none" stroke="#d79b00" stroke-width="1.8" marker-end="url(#arrAmber)"/>
  <path d="M640,238 V258" fill="none" stroke="#d79b00" stroke-width="1.8" marker-end="url(#arrAmber)"/>
  <path d="M640,310 V330" fill="none" stroke="#d79b00" stroke-width="1.8" marker-end="url(#arrAmber)"/>
  <path d="M640,382 V402" fill="none" stroke="#d79b00" stroke-width="1.8" marker-end="url(#arrAmber)"/>
  <text x="650" y="396" font-size="10" fill="#7a5a18">signal?</text>
  <path d="M640,454 V474" fill="none" stroke="#d79b00" stroke-width="1.8" marker-end="url(#arrAmber)"/>
  <text x="650" y="468" font-size="10" fill="#7a5a18">pass?</text>
  <path d="M640,526 V546" fill="none" stroke="#d6b656" stroke-width="1.8" marker-end="url(#arrGold)"/>
  <path d="M640,598 V618" fill="none" stroke="#d79b00" stroke-width="1.8" marker-end="url(#arrAmber)"/>

  <!-- position/PnL feedback into risk -->
  <path d="M540,572 H505 Q492,572 492,428 Q492,416 505,416 H540" fill="none" stroke="#d6b656" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrGold)"/>
  <text x="430" y="496" font-size="9.5" fill="#a8862f">net pos / PnL</text>

  <!-- record -> reporter -->
  <path d="M740,647 H812 Q840,647 840,564 H910" fill="none" stroke="#82b366" stroke-width="1.8" marker-end="url(#arrGreen)"/>
  <text x="788" y="606" font-size="9.5" fill="#4d7a3a">aggregate off</text>
  <text x="788" y="618" font-size="9.5" fill="#4d7a3a">hot thread</text>

  <!-- reporter -> arcswap -> dashboard -> browser -->
  <path d="M1045,536 V452" fill="none" stroke="#82b366" stroke-width="1.8" marker-end="url(#arrGreen)"/>
  <path d="M1045,402 V318" fill="none" stroke="#82b366" stroke-width="1.8" marker-end="url(#arrGreen)"/>
  <path d="M1045,262 V194" fill="none" stroke="#82b366" stroke-width="1.8" marker-end="url(#arrGreen)"/>
  <text x="1055" y="234" font-size="9.5" fill="#4d7a3a">HTTP /metrics.json (1s poll)</text>

  <!-- ===== Legend ===== -->
  <rect x="20" y="640" width="430" height="120" rx="6" fill="#f6f8fa" stroke="#999"/>
  <text x="34" y="662" font-size="11" fill="#1f2328"><tspan font-weight="700">Timing</tspan>: t0 pop · t1 decode · t2 book · t3 signal · t4 risk · t5 gateway</text>
  <text x="34" y="681" font-size="11" fill="#1f2328"><tspan font-weight="700">Totals</tspan>: tick→signal (every packet), tick→order (tick-to-trade)</text>
  <text x="34" y="700" font-size="11" fill="#1f2328"><tspan font-weight="700">Modules</tspan>: loadgen · mdp3 · orderbook · signal · risk · gateway</text>
  <text x="34" y="715" font-size="11" fill="#1f2328">· timing · metrics · pipeline · runner</text>
  <text x="34" y="740" font-size="10.5" fill="#555">Linux-x86 fast path (rdtscp pinning, huge pages) is feature-gated,</text>
  <text x="34" y="753" font-size="10.5" fill="#555">off by default.</text>
</svg>
